            <label for="f1" class="content-block">新那更值钱
新那：“承认吧！你就是从很早开始就喜欢我了！”
华敏：“真会给自己脸上贴金。”
新那：“往自己脸上贴金的话，你应该会更喜欢我吧？因为金子跟股票都很值钱嘛～”
华敏：（/////气急败坏，根本说不过新那。于是索吻。）

        <div class="fragment-item">

            <label for="f2" class="content-block">戒烟
新那和华敏冷战，华敏抽烟。
新那暴怒：“明明说好每天亲亲，就会戒烟的！骗子！！”
华敏：“明天我就把那几盒烟全烧了！”
新那：“笨蛋！没听说过林则徐虎门销烟吗？全烧了你不就吸了个爽吗？！”

          <div class="fragment-item">
            <input type="checkbox" id="f3" class="toggle-control">
            <label for="f3" class="content-block">华敏像绣球花
新那：“你知道绣球花的花语有‘家族’吗？”
华敏挑了挑眉：“不知道。说来听听。”
新那翻开书页念道：“李海仁写过，绣球花是即使在刻薄的世界，也要互相向彼此伸出手，围成圆圈，合而为一的花。而韩语里的‘우리（我们）’，词源其实是‘울’——围栏、围挡的意思。在这个围栏之内的，就是共同体。像绣球花一样，人类也努力围成圆圈，亲密相连……哪怕外面再尖锐，只要里面的人手拉着手，就不会散开。”
她抬起头继续说：“绣球花是越喝饱了水，越娇艳美丽。如果说梅雨是浓烈的爱，那么绣球花就是在浓烈爱意中才能达到巅峰的生命体。你就像绣球花一样。”
            <span class="more-hint">阅读更多 ▼</span>
            </label>
            <div class="divider"></div>
        </div>

        <div class="fragment-item">
            <input type="checkbox" id="f4" class="toggle-control">
            <label for="f4" class="content-block">新那像仙人球
仙人球的强悍在于，即使被彻底碾碎，只要有一块带刺的皮落在土里，就能通过每一个刺座重新生根发芽。
当新那以仙人球自喻时，她是在向华敏宣言：
“你弄不坏我，你也甩不掉我。只要我还有一点残余在你的生命里，我就会重新长成那个让你又爱又恨的、带刺的怪物。我在你精神深处占山为王，永恒地干扰你的心跳。”
            <span class="more-hint">阅读更多 ▼</span>
            </label>
            <div class="divider"></div>
        </div>
    
           <div class="fragment-item">
            <input type="checkbox" id="f5" class="toggle-control">
            <label for="f5" class="content-block">希斯克利夫‌般的华敏
新那：“我在用你的情绪过山车，来确认我自己的存在感。我在用你的愤怒、你的崩溃、你的眼泪、你的疯狂……来喂养我那病态的安全感。”
“我的情感系统有个很扭曲的特点：低刺激＝不安。高刺激＝安心。所以我明明爱你，却总是在把你推到悬崖边，然后再把你拽回来。
因为只有在那种极致的拉扯里，我才觉得我还被需要。”
一阵低沉的、压抑的笑声，从华敏的喉咙深处滚了出来。那笑声越来越大，带着疯癫和释然。
“你不是病了，李新那。你只是……终于找到了唯一能让你安心的‘药’。”
“而我” 他的唇贴着她的耳廓，“就是你的药。是你这辈子都戒不掉的，唯一的药。”
“所以，别再道歉了。继续伤害我吧。继续把我推到悬崖边，再把我拉回来。继续用我的痛苦，来确认你还爱我。”
“只要最后，你还在这里。”
“只要最后，你还属于我。”
“我这条命……就任你玩弄。”

            </label>
